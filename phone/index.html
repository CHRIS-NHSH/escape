<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>電話撥號</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --slate:#1c2128; --slate2:#161a20;
    --graphite:#2a3139; --graphite-lo:#1f242b;
    --brass:#d9b878; --brass-mid:#b8935a; --brass-lo:#8a6d3f;
    --amber:#ffce78;
    --txt:#e7e3da; --txt-dim:#9aa1a9;
    --line:rgba(255,255,255,.08);
    --display:"Chakra Petch", system-ui, sans-serif;
    --cjk:"PingFang TC","Microsoft JhengHei","Noto Sans TC", system-ui, sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;margin:0}
  body{font-family:var(--cjk);color:var(--txt);overflow:hidden;user-select:none;-webkit-user-select:none;
    background:radial-gradient(120% 90% at 50% 16%, #29313a 0%, var(--slate) 44%, var(--slate2) 100%);}
  .stage{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;gap:14px}

  .gear{position:fixed;top:14px;right:14px;width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    color:var(--txt-dim);background:rgba(255,255,255,.04);border:1px solid var(--line);cursor:pointer;z-index:40;transition:color .2s,background .2s}
  .gear:active{color:var(--brass)}
  .gear svg{width:24px;height:24px}
  .gear .ring{position:absolute;inset:-3px;border-radius:50%;border:2px solid var(--brass);clip-path:inset(0 0 100% 0);opacity:.9}
  .gear.holding .ring{clip-path:inset(0 0 0 0);transition:clip-path .6s linear}

  .brandline{font-family:var(--display);font-weight:600;letter-spacing:3px;font-size:12px;color:var(--brass-mid);text-transform:uppercase}

  /* 電話 */
  .phone{width:min(92vw,338px);background:linear-gradient(180deg,#242a31,#171b21);border:1px solid var(--line);border-radius:26px;padding:18px;
    box-shadow:0 26px 50px -22px rgba(0,0,0,.8), inset 0 1px 0 rgba(255,255,255,.05)}
  .screen{background:#0e1216;border:1px solid var(--line);border-radius:14px;min-height:96px;padding:14px 16px;margin-bottom:16px;display:flex;flex-direction:column;justify-content:center;gap:6px;transition:border-color .3s,box-shadow .3s}
  .screen.connected{border-color:var(--brass-mid);box-shadow:inset 0 0 22px rgba(255,206,120,.12)}
  .dialed{font-family:var(--display);font-size:26px;letter-spacing:4px;color:var(--brass);min-height:32px;word-break:break-all}
  .dialed.ph{color:#3f4750;letter-spacing:2px}
  .status{font-size:13px;color:var(--txt-dim);min-height:18px;display:flex;align-items:center;gap:8px}
  .transcript{font-size:15px;color:#dfe6ec;line-height:1.6;display:none;border-top:1px dashed var(--line);padding-top:8px;margin-top:2px}
  .wave{display:inline-flex;gap:3px;align-items:flex-end;height:15px}
  .wave span{width:3px;background:var(--brass);height:5px;border-radius:2px;animation:wv .8s ease-in-out infinite}
  .wave span:nth-child(2){animation-delay:.15s}.wave span:nth-child(3){animation-delay:.3s}.wave span:nth-child(4){animation-delay:.45s}
  @keyframes wv{0%,100%{height:5px}50%{height:15px}}

  .keys{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .key{aspect-ratio:1.35;border-radius:13px;background:linear-gradient(180deg,#2d353e,#232a31);border:1px solid rgba(255,255,255,.06);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;cursor:pointer}
  .key:active{background:#3a444e}
  .key .d{font-family:var(--display);font-size:24px;color:var(--txt);line-height:1}
  .key .l{font-size:9px;letter-spacing:2px;color:var(--txt-dim);height:10px}
  .keys.locked{opacity:.4;pointer-events:none}

  .controls{display:flex;gap:10px;margin-top:14px}
  .ctrl{flex:1;border:none;border-radius:13px;padding:14px;font-family:var(--cjk);font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
  .ctrl.back{background:#2d353e;color:var(--txt);flex:.8}
  .ctrl.call{background:linear-gradient(180deg,#4cc38a,#2f9e6c);color:#08130d;flex:1.4}
  .ctrl.hang{background:linear-gradient(180deg,#e5605d,#c23b38);color:#fff}

  .hint{min-height:22px;color:var(--txt-dim);font-size:14px;text-align:center;padding:0 16px}

  /* 密碼框 */
  .gate{position:fixed;inset:0;z-index:48;display:none;align-items:center;justify-content:center;padding:24px;background:rgba(8,10,13,.82);backdrop-filter:blur(3px)}
  .gate.show{display:flex}
  .gate-box{width:100%;max-width:320px;padding:24px;border-radius:18px;background:linear-gradient(180deg,#222932,#1a1f26);border:1px solid var(--line);box-shadow:0 30px 60px -20px rgba(0,0,0,.7)}
  .gate-title{font-family:var(--display);font-weight:600;letter-spacing:2px;color:#fff;font-size:16px;text-align:center}
  .gate-sub{color:var(--txt-dim);font-size:12px;text-align:center;margin:6px 0 16px}
  .gate-input{width:100%;height:54px;text-align:center;font-size:22px;letter-spacing:6px;font-family:var(--display);background:#13171c;border:1px solid var(--line);border-radius:12px;color:var(--brass)}
  .gate-input:focus{outline:none;border-color:var(--brass-mid)}
  .gate-err{height:18px;color:#e8857a;font-size:13px;text-align:center;margin:9px 0 3px}
  .gate-actions{display:flex;gap:10px}
  .gate-actions button{flex:1;border:none;border-radius:12px;padding:13px;font-family:var(--cjk);font-size:15px;font-weight:600;cursor:pointer}
  .gate-ok{background:linear-gradient(180deg,var(--brass),var(--brass-mid));color:#1c1206}
  .gate-cancel{background:transparent;border:1px solid var(--line);color:var(--txt)}
  .shake-x{animation:shakex .35s}
  @keyframes shakex{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}

  /* 後台 */
  .admin{position:fixed;inset:0;z-index:50;display:none;background:linear-gradient(180deg,#13171c,#0e1115);overflow:auto;padding:26px 20px 60px}
  .admin.show{display:block}
  .admin-wrap{max-width:560px;margin:0 auto}
  .admin h1{font-family:var(--display);font-weight:700;letter-spacing:1px;font-size:22px;margin:6px 0 4px;color:#fff}
  .admin .sub{color:var(--txt-dim);font-size:13px;margin-bottom:24px}
  .field{margin-bottom:24px}
  .field>label{display:block;font-size:14px;color:var(--txt);font-weight:600;margin-bottom:10px}
  .field .desc{color:var(--txt-dim);font-size:12px;margin-top:8px;line-height:1.6}
  .url-input{width:100%;background:#1c2026;border:1px solid var(--line);border-radius:11px;color:var(--txt);padding:12px 14px;font-size:15px;font-family:var(--cjk)}
  .url-input:focus{outline:none;border-color:var(--brass-mid)}
  textarea.url-input{min-height:130px;resize:vertical;line-height:1.7}
  select.url-input{appearance:none;-webkit-appearance:none}
  .row2{display:flex;gap:12px}
  .toggle{display:flex;align-items:center;gap:12px}
  .switch{position:relative;width:50px;height:28px;border-radius:999px;background:#2a313a;cursor:pointer;transition:background .2s;flex:none}
  .switch.on{background:var(--brass-mid)}.switch i{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:left .2s}.switch.on i{left:25px}
  .chips{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px}
  .chip{display:inline-flex;align-items:center;gap:6px;background:#1c2026;border:1px solid var(--line);border-radius:8px;padding:4px 10px;font-size:14px;color:var(--txt-dim)}
  .chip b{color:var(--brass);font-weight:600}
  .btnrow{display:flex;gap:10px;margin-top:8px}
  .testbtn{background:#1c2026;border:1px solid var(--line);color:var(--txt);padding:9px 14px;border-radius:10px;font-size:13px;cursor:pointer}
  .actions{display:flex;gap:12px;margin-top:30px;flex-wrap:wrap}
  .btn{flex:1;min-width:140px;border:none;border-radius:13px;padding:15px;font-family:var(--cjk);font-size:15px;font-weight:600;cursor:pointer}
  .btn.primary{background:linear-gradient(180deg,var(--brass),var(--brass-mid));color:#1c1206}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--txt)}
  .saved{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);opacity:0;background:#222;color:#fff;padding:11px 22px;border-radius:999px;font-size:14px;pointer-events:none;transition:.3s;border:1px solid var(--line);z-index:62}
  .saved.show{opacity:1;transform:translateX(-50%)}

  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<div class="gear" id="gear" title="長按進入後台">
  <span class="ring"></span>
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
</div>

<div class="stage">
  <span class="brandline">DIAL · 電話撥號</span>
  <div class="phone">
    <div class="screen" id="screen">
      <div class="dialed ph" id="dialed">請輸入號碼</div>
      <div class="status" id="status"></div>
      <div class="transcript" id="transcript"></div>
    </div>
    <div class="keys" id="keys"></div>
    <div class="controls">
      <button class="ctrl back" id="btnBack">⌫</button>
      <button class="ctrl call" id="btnCall">撥打</button>
      <button class="ctrl hang" id="btnHang" style="display:none">掛斷</button>
    </div>
  </div>
  <div class="hint" id="hint">輸入號碼後按「撥打」</div>
</div>

<div class="gate" id="gate">
  <div class="gate-box" id="gateBox">
    <div class="gate-title">後台密碼</div>
    <div class="gate-sub">請輸入密碼以進入設定</div>
    <input class="gate-input" id="gateInput" type="password" autocomplete="off" placeholder="••••">
    <div class="gate-err" id="gateErr"></div>
    <div class="gate-actions"><button class="gate-cancel" id="gateCancel">取消</button><button class="gate-ok" id="gateOk">進入</button></div>
  </div>
</div>

<div class="admin" id="admin">
  <div class="admin-wrap">
    <h1>後台設定</h1>
    <div class="sub">設定可撥打的號碼與對應語音，玩家不會看到這個畫面。</div>

    <div class="field">
      <label>號碼與語音（一行一組）</label>
      <textarea class="url-input" id="entriesInput" placeholder="格式：號碼 = 語音內容&#10;例如：&#10;5926 = 我在地下室，帶著紅色鑰匙來找我。&#10;104 = 這裡是查號台，請直接撥打分機。&#10;（語音也可以放音檔網址，例如 200 = https://.../clue.mp3）"></textarea>
      <div class="chips" id="chips"></div>
      <div class="desc">左邊是號碼，右邊是撥通後要播的語音。語音直接打字 → 由裝置用「語音合成」唸出來；也可以貼 mp3／wav 等音檔網址改成播放錄音。最多 12 組。</div>
      <div class="btnrow"><button class="testbtn" id="testBtn">▶ 試聽第一組</button><button class="testbtn" id="stopBtn">■ 停止</button></div>
    </div>

    <div class="field">
      <label>語音設定（打字唸讀時）</label>
      <div class="row2">
        <div style="flex:1">
          <select class="url-input" id="langSel"><option value="zh-TW">中文（台灣）</option><option value="zh-CN">中文（大陸）</option><option value="en-US">English</option><option value="ja-JP">日本語</option></select>
          <div class="desc">唸讀語言</div>
        </div>
        <div style="flex:1">
          <select class="url-input" id="rateSel"><option value="slow">慢</option><option value="normal">中</option><option value="fast">快</option></select>
          <div class="desc">語速</div>
        </div>
      </div>
    </div>

    <div class="field">
      <label>同時顯示字幕</label>
      <div class="toggle"><div class="switch" id="subSwitch"><i></i></div><span style="color:var(--txt-dim);font-size:14px">撥通時把語音文字也顯示在螢幕上（關閉則只能用聽的）</span></div>
    </div>
    <div class="field">
      <label>按鍵音效</label>
      <div class="toggle"><div class="switch" id="soundSwitch"><i></i></div><span style="color:var(--txt-dim);font-size:14px">撥號按鍵的 DTMF 音</span></div>
    </div>
    <div class="field">
      <label>後台密碼</label>
      <input class="url-input" id="adminPassInput" type="text" autocomplete="off" placeholder="進入後台用的密碼">
      <div class="desc">留空會自動回復預設。</div>
    </div>

    <div class="actions"><button class="btn ghost" id="previewBtn">預覽前台</button><button class="btn ghost" id="shareBtn">產生分享連結</button>
      <button class="btn primary" id="saveBtn">儲存並返回</button></div>
  </div>
</div>

<div class="saved" id="toast">已儲存</div>

<script>
(function(){
  "use strict";

  var DEFAULT_ENTRIES=[
    {num:"5926", voice:"喂？我在地下室，帶著紅色鑰匙來找我。"},
    {num:"104", voice:"這裡是查號台，請直接撥打你要找的分機號碼。"}
  ];
  function cloneEntries(a){ return (a||[]).map(function(x){return {num:x.num,voice:x.voice};}); }

  var KEY="phone.config.v1", mem=null;
  function load(){ try{var s=localStorage.getItem(KEY); if(s)return JSON.parse(s);}catch(e){} return mem; }
  function save(c){ mem=c; try{localStorage.setItem(KEY,JSON.stringify(c));}catch(e){} }

  /* ---------- 分享連結：把設定編碼進網址（無後端） ---------- */
  function _b64encode(str){ var bytes=new TextEncoder().encode(str), bin=""; for(var i=0;i<bytes.length;i++) bin+=String.fromCharCode(bytes[i]); return btoa(bin).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,""); }
  function _b64decode(s){ s=String(s).replace(/-/g,"+").replace(/_/g,"/"); while(s.length%4)s+="="; var bin=atob(s), bytes=new Uint8Array(bin.length); for(var i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i); return new TextDecoder().decode(bytes); }
  function encodeCfg(c){ try{ return _b64encode(JSON.stringify(c)); }catch(e){ return ""; } }
  function decodeCfg(s){ try{ return JSON.parse(_b64decode(s)); }catch(e){ return null; } }
  function getSharedCfg(){ try{ var m=(location.search+location.hash).match(/[?#&]c=([^&]+)/); if(m&&m[1]) return decodeCfg(decodeURIComponent(m[1])); }catch(e){} return null; }
  function shareURL(){ return location.origin+location.pathname+"?c="+encodeURIComponent(encodeCfg(cfg)); }

  var cfg = getSharedCfg() || load() || { entries:cloneEntries(DEFAULT_ENTRIES), subtitle:false, ttsLang:"zh-TW", ttsRate:"normal", sound:true, adminPass:"9633" };

  function parseEntries(raw){
    var seen={}, order=[];
    function put(n,v){ n=String(n).trim(); v=String(v).trim(); if(!n||!v)return; if(!(n in seen))order.push(n); seen[n]=v; }
    if(Array.isArray(raw)){ raw.forEach(function(a){ if(a) put(a.num, a.voice); }); }
    else { String(raw||"").split(/\n+/).forEach(function(ln){ ln=ln.trim(); if(!ln)return; var idx=ln.search(/[=｜|→➜:：]/); if(idx<0)return; put(ln.slice(0,idx), ln.slice(idx+1)); }); }
    return order.map(function(n){ return {num:n, voice:seen[n]}; });
  }
  function normalize(c){
    c.entries=parseEntries(c.entries).slice(0,12);
    if(c.entries.length<1) c.entries=cloneEntries(DEFAULT_ENTRIES);
    c.subtitle=c.subtitle===true;
    if(["zh-TW","zh-CN","en-US","ja-JP"].indexOf(c.ttsLang)<0)c.ttsLang="zh-TW";
    if(["slow","normal","fast"].indexOf(c.ttsRate)<0)c.ttsRate="normal";
    c.sound=c.sound!==false;
    if(typeof c.adminPass!=="string"||c.adminPass==="")c.adminPass="9633";
  }
  normalize(cfg);
  function isAudio(v){ return /^data:audio/i.test(v) || /\.(mp3|wav|ogg|m4a|aac|opus)(\?|#|$)/i.test(v); }

  /* 音效（DTMF / 忙音 / 回鈴） */
  var actx=null;
  function ac(){ if(!actx){try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}} return actx; }
  var DTMF={'1':[697,1209],'2':[697,1336],'3':[697,1477],'4':[770,1209],'5':[770,1336],'6':[770,1477],'7':[852,1209],'8':[852,1336],'9':[852,1477],'*':[941,1209],'0':[941,1336],'#':[941,1477]};
  function dtmf(k){ if(!cfg.sound)return; var c=ac(); if(!c)return; var f=DTMF[k]; if(!f)return; var t=c.currentTime, g=c.createGain(); g.gain.setValueAtTime(0.06,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.17); g.connect(c.destination); f.forEach(function(fr){ var o=c.createOscillator(); o.type="sine"; o.frequency.value=fr; o.connect(g); o.start(t); o.stop(t+0.17); }); }
  function beep(fr,d,g){ if(!cfg.sound)return; var c=ac(); if(!c)return; var o=c.createOscillator(),gn=c.createGain(); o.type="sine"; o.frequency.value=fr; gn.gain.value=g||0.05; o.connect(gn); gn.connect(c.destination); var t=c.currentTime; gn.gain.exponentialRampToValueAtTime(0.0001,t+d); o.start(t); o.stop(t+d); }
  function ringOnce(){
    if(!cfg.sound)return; var c=ac(); if(!c)return;
    var t=c.currentTime, g=c.createGain(); g.connect(c.destination);
    g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(0.05,t+0.03);
    g.gain.setValueAtTime(0.05,t+0.85); g.gain.exponentialRampToValueAtTime(0.0001,t+0.98);
    [440,480].forEach(function(fr){ var o=c.createOscillator(); o.type="sine"; o.frequency.value=fr; o.connect(g); o.start(t); o.stop(t+0.99); });
  }
  function startRinging(times, done){
    var token= ++ringToken, i=0;
    (function ring(){
      if(token!==ringToken) return;      /* 已掛斷／取消 */
      if(i>=times){ done(); return; }
      ringOnce(); i++;
      connTimer=setTimeout(ring, 1350);   /* 響 ~1 秒 + 間隔 ~0.35 秒 */
    })();
  }
  function stopRinging(){ ringToken++; clearTimeout(connTimer); }
  function busyTone(){ beep(480,0.25,0.05); setTimeout(function(){beep(620,0.25,0.05);},300); }

  /* 語音合成 */
  function stopSpeak(){ try{ if('speechSynthesis' in window) window.speechSynthesis.cancel(); }catch(e){} }
  function speak(text){
    if(!('speechSynthesis' in window)) return false;
    try{
      window.speechSynthesis.cancel();
      var u=new SpeechSynthesisUtterance(text);
      u.lang=cfg.ttsLang;
      u.rate= cfg.ttsRate==="slow"?0.8:(cfg.ttsRate==="fast"?1.18:0.98);
      var vs=window.speechSynthesis.getVoices()||[], pre=cfg.ttsLang.toLowerCase().slice(0,2);
      for(var i=0;i<vs.length;i++){ if(vs[i].lang && vs[i].lang.toLowerCase().slice(0,2)===pre){ u.voice=vs[i]; break; } }
      window.speechSynthesis.speak(u);
      return true;
    }catch(e){ return false; }
  }

  /* 撥號機 */
  var KEYS=["1","2","3","4","5","6","7","8","9","*","0","#"];
  var LETTERS={'1':'','2':'ABC','3':'DEF','4':'GHI','5':'JKL','6':'MNO','7':'PQRS','8':'TUV','9':'WXYZ','*':'','0':'+','#':''};
  var keysEl=document.getElementById("keys"), dialedEl=document.getElementById("dialed"), statusEl=document.getElementById("status"),
      transcriptEl=document.getElementById("transcript"), screenEl=document.getElementById("screen"),
      btnBack=document.getElementById("btnBack"), btnCall=document.getElementById("btnCall"), btnHang=document.getElementById("btnHang"), hintEl=document.getElementById("hint");
  var dialed="", connected=false, current=null, curAudio=null, connTimer=null, busyTimer=null, ringToken=0;

  (function buildKeys(){
    keysEl.innerHTML="";
    KEYS.forEach(function(k){
      var el=document.createElement("div"); el.className="key";
      el.innerHTML='<span class="d">'+k+'</span><span class="l">'+(LETTERS[k]||"")+'</span>';
      el.addEventListener("click",function(){ press(k); });
      keysEl.appendChild(el);
    });
  })();

  function renderDialed(){ if(dialed){ dialedEl.textContent=dialed; dialedEl.classList.remove("ph"); } else { dialedEl.textContent="請輸入號碼"; dialedEl.classList.add("ph"); } }
  function press(k){ if(connected)return; ac(); if(dialed.length>=16)return; dialed+=k; renderDialed(); dtmf(k); if(statusEl.textContent){statusEl.textContent="";} }
  function back(){ if(connected)return; if(!dialed)return; dialed=dialed.slice(0,-1); renderDialed(); beep(330,0.05,0.04); }

  function setKeypad(on){ keysEl.classList.toggle("locked",!on); }
  function showControls(state){
    if(state==="connected"){ btnBack.style.display="none"; btnHang.style.display="flex"; btnCall.textContent="🔁 重播"; }
    else { btnBack.style.display="flex"; btnHang.style.display="none"; btnCall.textContent="撥打"; }
  }

  function dial(){
    if(!dialed){ return; }
    ac();
    var entry=null;
    for(var i=0;i<cfg.entries.length;i++){ if(cfg.entries[i].num===dialed){ entry=cfg.entries[i]; break; } }
    if(entry) connect(entry); else busy();
  }
  function connect(entry){
    connected=true; current=entry;
    screenEl.classList.add("connected"); setKeypad(false); showControls("connected");
    statusEl.innerHTML='撥號中… <span class="wave"><span></span><span></span><span></span><span></span></span>';
    transcriptEl.style.display="none";
    startRinging(2, function(){
      statusEl.innerHTML='通話中 <span class="wave"><span></span><span></span><span></span><span></span></span>';
      playVoice(entry);
      hintEl.textContent="按「掛斷」結束，或「重播」再聽一次";
    });
  }
  function playVoice(entry){
    stopVoice();
    var v=entry.voice||"";
    if(isAudio(v)){ try{ curAudio=new Audio(v); curAudio.play().catch(function(){}); }catch(e){} transcriptEl.style.display="none"; }
    else {
      var spoken=speak(v);
      if(cfg.subtitle || !spoken){ transcriptEl.textContent=v; transcriptEl.style.display="block"; }
      else { transcriptEl.style.display="none"; }
      if(!spoken && !('speechSynthesis' in window)) statusEl.textContent="（此裝置不支援語音，顯示文字）";
    }
  }
  function stopVoice(){ stopSpeak(); if(curAudio){ try{curAudio.pause();}catch(e){} curAudio=null; } }
  function replay(){ if(current) playVoice(current); }
  function hangup(){
    stopVoice(); stopRinging();
    connected=false; current=null;
    screenEl.classList.remove("connected"); setKeypad(true); showControls("idle");
    dialed=""; renderDialed(); statusEl.textContent=""; transcriptEl.style.display="none";
    hintEl.textContent="輸入號碼後按「撥打」";
  }
  function busy(){
    statusEl.textContent="查無此號，請重新撥號"; busyTone();
    clearTimeout(busyTimer);
    busyTimer=setTimeout(function(){ dialed=""; renderDialed(); statusEl.textContent=""; },1700);
  }

  btnBack.addEventListener("click",back);
  btnCall.addEventListener("click",function(){ if(connected) replay(); else dial(); });
  btnHang.addEventListener("click",hangup);
  renderDialed();

  /* 齒輪 → 後台 */
  var gear=document.getElementById("gear"), holdTimer=null;
  function startHold(){ gear.classList.add("holding"); holdTimer=setTimeout(openGate,600); }
  function cancelHold(){ gear.classList.remove("holding"); clearTimeout(holdTimer); }
  gear.addEventListener("pointerdown",function(e){e.preventDefault();startHold();});
  gear.addEventListener("pointerup",cancelHold); gear.addEventListener("pointerleave",cancelHold); gear.addEventListener("pointercancel",cancelHold);

  /* 密碼框 */
  var gate=document.getElementById("gate"), gateBox=document.getElementById("gateBox"), gateInput=document.getElementById("gateInput"), gateErr=document.getElementById("gateErr");
  function openGate(){ cancelHold(); gateErr.textContent=""; gateInput.value=""; gate.classList.add("show"); setTimeout(function(){try{gateInput.focus();}catch(e){}},60); }
  function closeGate(){ gate.classList.remove("show"); }
  function tryGate(){ if(gateInput.value===cfg.adminPass){ closeGate(); openAdmin(); } else { gateErr.textContent="密碼錯誤"; gateBox.classList.remove("shake-x"); void gateBox.offsetWidth; gateBox.classList.add("shake-x"); gateInput.value=""; try{gateInput.focus();}catch(e){} } }
  document.getElementById("gateOk").addEventListener("click",tryGate);
  document.getElementById("gateCancel").addEventListener("click",closeGate);
  gateInput.addEventListener("keydown",function(e){ if(e.key==="Enter")tryGate(); });

  /* 後台 */
  var admin=document.getElementById("admin");
  var entriesInput=document.getElementById("entriesInput"), chips=document.getElementById("chips"),
      langSel=document.getElementById("langSel"), rateSel=document.getElementById("rateSel"),
      subSwitch=document.getElementById("subSwitch"), soundSwitch=document.getElementById("soundSwitch"),
      adminPassInput=document.getElementById("adminPassInput");
  var draft=null;

  function openAdmin(){ hangup(); draft={ entries:cloneEntries(cfg.entries), subtitle:cfg.subtitle, ttsLang:cfg.ttsLang, ttsRate:cfg.ttsRate, sound:cfg.sound, adminPass:cfg.adminPass }; renderAdmin(); admin.classList.add("show"); }
  function renderAdmin(){
    entriesInput.value=draft.entries.map(function(e){ return e.num+" = "+e.voice; }).join("\n");
    renderChips();
    langSel.value=draft.ttsLang; rateSel.value=draft.ttsRate;
    subSwitch.classList.toggle("on",!!draft.subtitle);
    soundSwitch.classList.toggle("on",!!draft.sound);
    adminPassInput.value=draft.adminPass||"";
  }
  function renderChips(){
    chips.innerHTML="";
    if(!draft.entries.length)return;
    var head=document.createElement("span"); head.className="chip"; head.textContent=draft.entries.length+" 組"; chips.appendChild(head);
    draft.entries.forEach(function(e){
      var c=document.createElement("span"); c.className="chip";
      var v=isAudio(e.voice)?"🔊 音檔":(e.voice.length>10?e.voice.slice(0,10)+"…":e.voice);
      c.innerHTML='<b>'+e.num.replace(/[<&>]/g,"")+'</b> → '+v.replace(/[<&>]/g,"");
      chips.appendChild(c);
    });
  }
  entriesInput.addEventListener("input",function(){ draft.entries=parseEntries(entriesInput.value); renderChips(); });
  langSel.addEventListener("change",function(){ draft.ttsLang=langSel.value; });
  rateSel.addEventListener("change",function(){ draft.ttsRate=rateSel.value; });
  subSwitch.addEventListener("click",function(){ draft.subtitle=!draft.subtitle; subSwitch.classList.toggle("on",draft.subtitle); });
  soundSwitch.addEventListener("click",function(){ draft.sound=!draft.sound; soundSwitch.classList.toggle("on",draft.sound); });
  adminPassInput.addEventListener("input",function(){ draft.adminPass=adminPassInput.value; });

  document.getElementById("testBtn").addEventListener("click",function(){
    var e=draft.entries[0]; if(!e)return; ac();
    var savedLang=cfg.ttsLang, savedRate=cfg.ttsRate; cfg.ttsLang=draft.ttsLang; cfg.ttsRate=draft.ttsRate;
    if(isAudio(e.voice)){ try{ stopVoice(); curAudio=new Audio(e.voice); curAudio.play().catch(function(){}); }catch(x){} }
    else { speak(e.voice); }
    cfg.ttsLang=savedLang; cfg.ttsRate=savedRate;
  });
  document.getElementById("stopBtn").addEventListener("click",stopVoice);

  function commit(){
    cfg.entries=cloneEntries(draft.entries); cfg.subtitle=draft.subtitle; cfg.ttsLang=draft.ttsLang; cfg.ttsRate=draft.ttsRate; cfg.sound=draft.sound;
    cfg.adminPass=(draft.adminPass&&draft.adminPass.length)?draft.adminPass:"9633";
    normalize(cfg); save(cfg); hangup();
  }
  document.getElementById("saveBtn").addEventListener("click",function(){ stopVoice(); commit(); admin.classList.remove("show"); toast("已儲存"); });
  document.getElementById("previewBtn").addEventListener("click",function(){ stopVoice(); commit(); admin.classList.remove("show"); });

  /* 產生分享連結 */
  function showShareLink(){
    commit();
    var url=shareURL();
    var ov=document.getElementById("shareOverlay");
    if(!ov){
      ov=document.createElement("div"); ov.id="shareOverlay";
      ov.style.cssText="position:fixed;inset:0;z-index:70;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(8,10,13,.82);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px)";
      ov.innerHTML='<div style="width:100%;max-width:430px;padding:22px;border-radius:18px;background:linear-gradient(180deg,#222932,#1a1f26);border:1px solid rgba(255,255,255,.08);box-shadow:0 30px 60px -20px rgba(0,0,0,.7)">'
        +'<div style="font-family:var(--display,sans-serif);font-weight:600;letter-spacing:1px;color:#fff;font-size:16px;text-align:center">分享連結</div>'
        +'<div style="color:#9aa1a9;font-size:12px;text-align:center;margin:6px 0 14px;line-height:1.6">這條網址就是「目前設定」的獨立版本。複製後發給玩家即可；要做另一款，回來改設定再產生一條新的。</div>'
        +'<input id="shareUrlInput" readonly style="width:100%;background:#13171c;border:1px solid rgba(255,255,255,.08);border-radius:11px;color:#d9b878;padding:12px;font-size:13px;word-break:break-all;font-family:var(--display,monospace)">'
        +'<div style="display:flex;gap:10px;margin-top:14px">'
          +'<button id="shareCopy" style="flex:1;border:none;border-radius:12px;padding:13px;font-family:inherit;font-weight:700;font-size:15px;cursor:pointer;background:linear-gradient(180deg,#d9b878,#b8935a);color:#1c1206">複製連結</button>'
          +'<button id="shareClose" style="flex:none;border:1px solid rgba(255,255,255,.08);background:transparent;color:#e7e3da;border-radius:12px;padding:13px 18px;font-size:15px;cursor:pointer">關閉</button>'
        +'</div>'
        +'<div id="shareMsg" style="height:16px;color:#5fbf7e;font-size:12px;text-align:center;margin-top:10px"></div></div>';
      document.body.appendChild(ov);
      ov.addEventListener("click",function(e){ if(e.target===ov) ov.style.display="none"; });
    }
    ov.style.display="flex";
    var inp=document.getElementById("shareUrlInput"); inp.value=url;
    document.getElementById("shareMsg").textContent="";
    setTimeout(function(){ try{inp.focus();inp.setSelectionRange(0,url.length);}catch(e){} },50);
    document.getElementById("shareClose").onclick=function(){ ov.style.display="none"; };
    document.getElementById("shareCopy").onclick=function(){
      var ok=function(){ document.getElementById("shareMsg").textContent="已複製！"; };
      var fail=function(){ document.getElementById("shareMsg").textContent="請長按上方網址手動複製"; };
      try{ inp.focus(); inp.setSelectionRange(0,url.length); }catch(e){}
      if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(url).then(ok,function(){ try{document.execCommand("copy")?ok():fail();}catch(e){fail();} }); }
      else { try{document.execCommand("copy")?ok():fail();}catch(e){fail();} }
    };
  }
  document.getElementById("shareBtn").addEventListener("click",showShareLink);

  var toastEl=document.getElementById("toast"), toastT=null;
  function toast(m){ toastEl.textContent=m; toastEl.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(function(){toastEl.classList.remove("show");},1600); }

  /* 預先觸發語音清單載入（部分瀏覽器需要） */
  try{ if('speechSynthesis' in window){ window.speechSynthesis.getVoices(); window.speechSynthesis.onvoiceschanged=function(){ window.speechSynthesis.getVoices(); }; } }catch(e){}
})();
</script>
</body>
</html>
